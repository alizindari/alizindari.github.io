<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1e"/>
      <stop offset="100%" stop-color="#111728"/>
    </linearGradient>

    <!-- Subtle dot-grid pattern -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.9" fill="#ffffff" opacity="0.055"/>
    </pattern>

    <!-- Soft glow at minimum -->
    <radialGradient id="minGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>

    <!-- Very soft area tint toward center -->
    <radialGradient id="centerTint" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3b5bdb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3b5bdb" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur for path glow -->
    <filter id="pathGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <!-- Blur for minimum glow -->
    <filter id="minBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- Soft central area tint -->
  <ellipse cx="600" cy="200" rx="420" ry="280" fill="url(#centerTint)"/>

  <!-- ── Contour Lines (rotated –18° around center) ── -->
  <!-- Colours go from near-invisible dark blue (outer) → bright slate-blue (inner) -->
  <g fill="none" stroke-linecap="round">
    <ellipse cx="600" cy="200" rx="545" ry="196" stroke="#141d35" stroke-width="1.0" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="476" ry="171" stroke="#192440" stroke-width="1.1" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="408" ry="147" stroke="#202e50" stroke-width="1.2" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="342" ry="123" stroke="#293a64" stroke-width="1.35" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="278" ry="100" stroke="#344878" stroke-width="1.5" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="216" ry="78"  stroke="#42598e" stroke-width="1.7" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="156" ry="56"  stroke="#5472a8" stroke-width="2.0" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="100" ry="36"  stroke="#6888c2" stroke-width="2.2" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="52"  ry="19"  stroke="#88a8d8" stroke-width="2.5" transform="rotate(-18,600,200)"/>
    <ellipse cx="600" cy="200" rx="18"  ry="7"   stroke="#afc6e8" stroke-width="2.8" transform="rotate(-18,600,200)"/>
  </g>

  <!-- ── Gradient Descent Path ── -->
  <!-- Waypoints zigzag in the ill-conditioned direction (roughly vertical) -->
  <!-- Start (θ₀) at bottom-right, converge to (600,200) -->

  <!-- Glow layer -->
  <polyline
    points="950,338 772,62 693,252 645,106 624,214 612,176 604,200 600,200"
    fill="none" stroke="#fbbf24" stroke-width="9" opacity="0.13"
    stroke-linejoin="round" filter="url(#pathGlow)"/>

  <!-- Main path -->
  <polyline
    points="950,338 772,62 693,252 645,106 624,214 612,176 604,200 600,200"
    fill="none" stroke="#fbbf24" stroke-width="2.0" opacity="0.88"
    stroke-linejoin="round"/>

  <!-- Waypoint dots (decreasing size → convergence) -->
  <circle cx="950" cy="338" r="5.5" fill="#fbbf24" opacity="0.85"/>
  <circle cx="772" cy="62"  r="5.0" fill="#fbbf24" opacity="0.80"/>
  <circle cx="693" cy="252" r="4.5" fill="#fbbf24" opacity="0.75"/>
  <circle cx="645" cy="106" r="4.0" fill="#fbbf24" opacity="0.70"/>
  <circle cx="624" cy="214" r="3.5" fill="#fbbf24" opacity="0.68"/>
  <circle cx="612" cy="176" r="3.0" fill="#fbbf24" opacity="0.68"/>
  <circle cx="604" cy="200" r="2.4" fill="#fbbf24" opacity="0.72"/>

  <!-- ── Minimum marker ── -->
  <!-- Glow -->
  <circle cx="600" cy="200" r="32" fill="url(#minGlow)" filter="url(#minBlur)"/>
  <!-- Outer white ring -->
  <circle cx="600" cy="200" r="7.5" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.7"/>
  <!-- White fill -->
  <circle cx="600" cy="200" r="6"   fill="#ffffff" opacity="0.92"/>
  <!-- Gold core -->
  <circle cx="600" cy="200" r="3.2" fill="#fbbf24"/>

  <!-- ── Labels ── -->
  <!-- θ₀ near start -->
  <text x="960" y="362"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" fill="#fbbf24" opacity="0.78">θ₀</text>

  <!-- θ* near minimum -->
  <text x="556" y="226"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" fill="#b0c8e8" opacity="0.88">θ*</text>

  <!-- Gradient update formula (bottom-left, subtle) -->
  <text x="44" y="382"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12.5" fill="#2e4878" opacity="0.9"
        letter-spacing="0.3">θ_{t+1} = θ_t − η ∇L(θ_t)</text>

  <!-- Optional: contour function label (top-left, very faint) -->
  <text x="44" y="42"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12" fill="#25365a" opacity="0.75"
        letter-spacing="0.3">L(θ)</text>
</svg>
